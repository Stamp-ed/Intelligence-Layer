services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: stamped_intelligence
      POSTGRES_USER: stamped
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stamped_dev_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stamped -d stamped_intelligence"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_data:/qdrant/storage
    ports:
      - "6333:6333"
      - "6334:6334"
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'exec 3<>/dev/tcp/127.0.0.1/6333'"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql://stamped:${POSTGRES_PASSWORD:-stamped_dev_password}@postgres:5432/stamped_intelligence
      QDRANT_HOST: qdrant
      POSTGRES_HOST: postgres
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    volumes:
      - ./apps/api/src:/app/apps/api/src
      - ./packages/database:/app/packages/database
      - uploads:/app/uploads
    command: >
      sh -c "pnpm db:migrate:deploy &&
             pnpm --filter @stamped/api dev"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - api
    volumes:
      - ./apps/web:/app/apps/web
      - /app/node_modules
      - /app/apps/web/node_modules
      - /app/apps/web/.next
    command: pnpm --filter @stamped/web dev

volumes:
  postgres_data:
  qdrant_data:
  uploads:
